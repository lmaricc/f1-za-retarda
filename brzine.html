<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brzine F1</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <h1>Brzine F1 bolida</h1>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Maksimalna brzina</h3>
        <p>F1 bolidi mogu doseći više od 370 km/h.</p>
      </div>

      <div class="card">
        <h3>Ubrzanje</h3>
        <p>0-100 km/h za oko 2.6 sekundi.</p>
      </div>

      <div class="card">
        <h3>Kočenje</h3>
        <p>Od 200 km/h do 0 za manje od 5 sekundi.</p>
      </div>
    </section>
  </body>
</html>
